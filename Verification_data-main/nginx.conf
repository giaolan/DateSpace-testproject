#user  cjm;
worker_processes  1;

events {
    worker_connections  1024;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    # 代理方式
    upstream verification {
	    server 127.0.0.1;
    }

   # http server
    server {
        listen       80;
        server_name 127.0.0.1;

        location / {
            root   /usr/share/nginx/html/dist;
            index  index.html index.html;
            # 解决history路由模式刷新404
            try_files $uri $uri/ /index.html;
        }

        location /api {  # /api/test/api     /test/api
            proxy_pass http://127.0.0.1:8888/; # 加/代表会丢弃/verification
            # proxy_pass verification; # 加/代表会丢弃/verification
        }

# 	    rewrite ^(.*)$  https://$host$1 permanent;

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }


    # HTTPS server

    server {
       listen       443 ssl;
       server_name  127.0.0.1;

        ssl_certificate     /usr/share/nginx/https/8603727_www.easyblog.vip.pem;
        ssl_certificate_key  /usr/share/nginx/https/8603727_www.easyblog.vip.key;

        ssl_session_cache    shared:SSL:1m;
        ssl_session_timeout  5m;

        ssl_ciphers  HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers  on;

        location / {
            root   /usr/share/nginx/html/dist;
            index  index.html index.htm;
            # 解决history路由模式刷新404
            try_files $uri $uri/ /index.html;
        }
        location /api {  # /verification/test/api     /test/api
            proxy_pass http://127.0.0.1:8888/; # 加/代表会丢弃/verification
            # proxy_pass verification; # 加/代表会丢弃/verification
        }
	    error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }

    }

}